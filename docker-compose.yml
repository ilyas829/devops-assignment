version: '3.8'

services:
  backend:
    build: .
    container_name: chat-backend
    restart: always
    # Fix: Add explicit network
    networks:
      - chat-network
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: chat-nginx
    ports:
      - "80:80"
    volumes:
      # Fix: Uncomment and correct frontend mounting
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    restart: always
    # Fix: Add explicit network
    networks:
      - chat-network

# Fix: Define custom network for better container communication
networks:
  chat-network:
    driver: bridge